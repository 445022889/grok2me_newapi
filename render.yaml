services:
  - type: web
    name: grok2me-newapi
    env: docker
    plan: free
    autoDeploy: false
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: TZ
        value: Asia/Shanghai
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE_ENABLED
        value: "false"
      - key: DATA_DIR
        value: /tmp/data
      - key: LOG_DIR
        value: /tmp/logs
      - key: SERVER_STORAGE_TYPE
        value: local
      - key: SERVER_STORAGE_URL
        value: ""
      - key: SERVER_HOST
        value: 0.0.0.0
      - key: SERVER_PORT
        value: "8000"
